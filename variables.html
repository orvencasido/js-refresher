<head>
  <title>Cart Quantity</title>
</head>

<body>
  <p>Cart Quantity</p>

  <button onClick="
    console.log(`Cart Quantity: ${cart}`);
  ">Show Quantity</button>

    console.log(`Added +1 in Cart: ${cart = cart + 1}`);
  ">Add to Cart</button>

    let cart = 0;
  </script>
