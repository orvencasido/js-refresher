<body>
  <p>lesson 6</p>

  <script>
    let hour = 7;
    let name = `Orven Casido`;

    if (hour >= 6 && hour <= 10) {
      console.log(`Hour is: ${hour}, Good Morning, ${name}!`)
    } else if (hour >= 13 && hour <= 17) {
      console.log(`Hour is: ${hour}, Good Afternoon, ${name}!`)
    } else {
      console.log(`Hour is: ${hour}, Good Night, ${name}!`)
    }
  </script>
