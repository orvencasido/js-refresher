<body>
  <button onclick="
    console.log(`${cart}`);

  ">+3</button>

  <button onclick="
    cart += 4;

  ">Clear Cart</button>

    cart--;

  <script>

    let cart = 0;

    //Old Act
    let name = `Orven Casidope`;
    console.log(`My Name is ${name}`);

    let cost = 0;

    let coffee = 5;
    let bagels = 3;
    let soup = 9;

    let tax = 0;
    let taxMultiplier = 0.1;

    cost = coffee + (2 * bagels) + soup;
    tax = cost * taxMultiplier;
    let totalCost = cost + tax;

    console.log(`Cost of food: ${cost}`);
