<!DOCTYPE html>
<html>

<head>

</head>

<body>
  <p>Rock Paper Scissors Game</p>

  <button onclick="game(`rock`)">Rock</button>
  <button onclick="game(`paper`)">Paper</button>
  <button onclick="game(`scissors`)">Scissors</button>
  <button onclick="clearScore()">Clear Score</button>

  <div>
    <p>You Picked: <span id="userPick"></span></p>
    <p>Computer Picked: <span id="computerPick"></span></p>
    <p>Result: <span id="result"></span></p>
  </div>

  <div>
    <p>Win: <span id="winText"></span></p>
    <p>Loss: <span id="lossText"></span></p>
    <p>Tie: <span id="tieText"></span></p>
  </div>

  <script>
    let score = JSON.parse(localStorage.getItem(`score`)) || {
      wins: 0,
      loss: 0,
      tie: 0
    }

    function displayText(userPick, computerPick, result) {
      document.getElementById(`userPick`).innerHTML = userPick;
      document.getElementById(`computerPick`).innerHTML = computerPick;
      document.getElementById(`result`).innerHTML = result;
    }

    function displayScore(win, loss, tie) {
      document.getElementById(`winText`).innerHTML = win;
      document.getElementById(`lossText`).innerHTML = loss;
      document.getElementById(`tieText`).innerHTML = tie;
    }


    function randomizer() {
      let random = Math.round(Math.random() * 11);
      let computer = ``;

      if (random >= 0 && random <= 3) {
        computer = `rock`;
      } else if (random >= 4 && random <= 7) {
        computer = `paper`;
      } else if (random >= 8 && random <= 11) {
        computer = `scissors`;
      }

      return computer
    }

    function game(user) {
      let randomResult = randomizer();
      let gameResult = ``;

      if (randomResult === user) {
        gameResult = `tie`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `paper` && user === `rock`) {
        gameResult = `you lose`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `scissors` && user === `rock`) {
        gameResult = `you win`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `scissors` && user === `paper`) {
        gameResult = `you lose`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `rock` && user === `paper`) {
        gameResult = `you win`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `rock` && user === `scissors`) {
        gameResult = `you lose`;
        displayText(user, randomResult, gameResult);
      } else if (randomResult === `paper` && user === `scissors`) {
        gameResult = `you win`;
        displayText(user, randomResult, gameResult);
      }

      if (gameResult === `you win`) {
        score.wins += 1;
      } else if (gameResult === `you lose`) {
        score.loss += 1;
      } else if (gameResult === `tie`) {
        score.tie += 1;
      }

      displayScore(score.wins, score.loss, score.tie);

      localStorage.setItem(`score`, JSON.stringify(score));
    }

    function clearScore() {
      displayScore(score.wins = 0, score.loss = 0, score.tie = 0);
    }
  </script>
</body>

</html>
