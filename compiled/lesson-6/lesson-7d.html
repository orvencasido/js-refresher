<!DOCTYPE html>
<html>

<head>
  <title>Lesson 7d</title>
</head>

<body>
  <p>Lesson 7d</p>

  <script>
    function convertToFahrenheit(celcius) {
      let fahrenheit = (celcius * 9 / 5) + 32;
      return fahrenheit;
    }

    function convertToCelcius(fahrenheight) {
      let celcius = (fahrenheight - 32) * 5 / 9;
      return celcius;
    }

    function convertTemperature(degrees, unit) {
      let temp = '';
      if (unit === `c` || unit === `C`) {
        temp = `${convertToFahrenheit(degrees)}C`;
      } else if (unit === `f` || unit === `F`) {
        temp = `${convertToCelcius(degrees)}F`;
      } else {
        console.log(`error`);
      }
      return temp;
    }

    console.log(`Fahrenheight: ${convertToFahrenheit(25)}`);
    console.log(`Celcius: ${convertToCelcius(86)}`);
    console.log(`Temperature: ${convertTemperature(86, `h`)}`)
  </script>
</body>

</html>
