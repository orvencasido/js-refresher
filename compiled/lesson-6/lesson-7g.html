<!DOCTYPE html>
<html>

<head>
  <title>Lesson 7g</title>
</head>

<body>
  <p>Lesson 7g</p>

  <script>
    function convertLength(length, from, to) {
      let result = 0;

      if (from === `km` && to === 'miles') {
        result = convertToMilesFromKm(length);
        return `${result} miles`;
      } else if (from === `miles` && to === 'km') {
        result = convertToKmFromMiles(length);
        return `${result} km`;
      } else if (from === `km` && to === `km`) {
        result = convertToKmFromKm(length);
        return `${result} km`;
      } else if (from === `miles` && to === `miles`) {
        result = convertToMilesFromMiles(length);
        return `${result} miles`;
      } else if (from === `feet` && to === `miles`) {
        result = convertToMilesFromFeet(length);
        return `${result} miles`;
      } else if (from === `feet` && to === `km`) {
        result = convertToKmFromFeet(length);
        return `${result} km`;
      } else if (from === `km` && to === `feet`) {
        result = convertToFeetFromKm(length);
        return `${result} feet`;
      } else if (from === `miles` && to === `feet`) {
        result = convertToFeetFromMiles(length);
        return `${result} feet`;
      } else if (from === `feet` && to === `feet`) {
        result = convertToFeetFromFeet(length);
        return `${result} feet`;
      } else {
        return `Invalid Unit: ${from}, ${to}`;
      }
    }

    function convertToKmFromMiles(length) {
      let result = Math.round(length * 1.60934);
      return result;
    }

    function convertToKmFromKm(length) {
      return length;
    }

    function convertToMilesFromKm(length) {
      let result = Math.round(length * 0.621371);
      return result;
    }

    function convertToMilesFromMiles(length) {
      return length;
    }

    function convertToFeetFromMiles(length) {
      let result = Math.round(length * 5280);
      return result;
    }

    function convertToFeetFromKm(length) {
      let result = Math.round(length * 3280.84)
      return result;
    }

    function convertToFeetFromFeet(length) {
      return length;
    }

    function convertToMilesFromFeet(length) {
      let result = Math.round(length / 5280);
      return result;
    }

    function convertToKmFromFeet(length) {
      let result = Math.round(length / 3281);
      return result;
    }

    console.log(convertLength(50, `miles`, `km`));
    console.log(convertLength(32, `km`, `miles`));
    console.log(convertLength(50, `km`, `km`));
    console.log(convertLength(5, `miles`, `km`));
    console.log(convertLength(5, `miles`, `feet`));
    console.log(convertLength(5, `km`, `feet`));
    console.log(convertLength(5, `lbs`, `lbs`));
  </script>
</body>

</html>
