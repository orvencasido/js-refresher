<!DOCTYPE html>
<html>

<head>
  <title>DOM with CSS</title>
  <style>
    p {
      font-family: Arial, Helvetica, sans-serif;
    }

    .subscribe-btn {
      background-color: black;
      color: white;
      border-style: none;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      width: 120px;
    }

    .subscribe-btn-clicked {
      background-color: rgb(228, 228, 228);
      color: black;
    }

    .amazon-title {
      margin-top: 50px;
    }

    .input-text {
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 10px;
      margin-right: 1px;
    }

    .input-text::placeholder {
      font-size: 15px;
    }

    .calc-btn {
      background-color: green;
      color: white;
      border-style: none;
      padding: 10px 17px;
      font-size: 15px;
      cursor: pointer;
    }

    .calc-btn:hover {
      opacity: 70%;
    }

    .calc-btn:active {
      opacity: 50%;
    }

    a {
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>

<body>
  <p>YouTube Subscribe Button</p>
  <button onclick="jsSubscribe()" class="subscribe-btn js-subscribe">Subscribe</button>

  <p class="amazon-title">Amacon Shipping Calculator</p>
  <p>Orders under $40 = +$10 shipping.</p>
  <p>Orders over $40 = FREE shipping.</p>
  <input onkeydown="enterKey(event)" class="input-text jsInputText" type="text" placeholder="Cost of order">
  <button onclick="calculcateBtn()" class="calc-btn calculcateBtn">Calculate</button>
  <p class="calcText"></p>

  <p class="amazon-title">Rock Paper Scissors</p>
  <a href="">Click Here</a>

  <script>
    function enterKey(event) {
      if (event.key === `Enter`) {
        calculcateBtn();
      }
    }

    function displayText(displayTextCalc) {
      document.querySelector('.calcText').innerHTML = displayTextCalc;
    }

    function calculcateBtn() {
      let inputText = document.querySelector('.jsInputText');
      inputText = Number(inputText.value);

      if (inputText < 40) {
        displayText(`$${inputText + 10}`);
      } else {
        displayText(`$${inputText}`);
      }

    }

    function jsSubscribe() {
      let jsText = document.querySelector(`.js-subscribe`);

      if (jsText.innerHTML === `Subscribe`) {
        jsText.innerHTML = `Subscribed`;
        jsText.classList.add('subscribe-btn-clicked');
      } else {
        jsText.innerHTML = `Subscribe`;
        jsText.classList.remove('subscribe-btn-clicked');
      }
    } 
  </script>
</body>

</html>
