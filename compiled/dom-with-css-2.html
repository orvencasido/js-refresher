<!DOCTYPE html>

<html>

<head>
  <title>DOM with CSS</title>
  <style>
    p {
      font-family: Arial, Helvetica, sans-serif;
    }

    button {
      cursor: pointer;
    }

    .subscribe-btn {
      background-color: black;
      color: white;
      font-weight: bold;
      border-style: none;
      padding: 10px 20px;
      border-radius: 20px;
    }

    .subscribe-btn-on {
      background-color: rgb(241, 241, 241);
      color: black;
    }

    .activity-1 {
      margin-bottom: 50px;
    }

    .input-txt {
      padding: 10px 0px;
      padding-left: 10px;
    }

    .calculate-btn {
      background-color: green;
      border-style: none;
      color: white;
      padding: 10px 20px;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="activity-1">
    <p>Youtube Subscribe Button</p>
    <button onclick="clickbtn()" class="subscribe-btn js-subscribe-btn">Subscribess</button>
  </div>

  <p>Amazon Shipping Container</p>
  <p>Orders under $40 = +$10 shipping.</p>
  <p>Orders over $40 = FREE shipping.</p>
  <input class="input-txt js-inputData" type="text" placeholder="Cost of order">
  <button onclick="calculateOrder()" class="calculate-btn">Calculate</button>
  <p><span class="js-calculateText"></span></p>

  <script>
    function displayCalculateText(txt) {
      document.querySelector(`.js-calculateText`).innerHTML = txt;
    }

    function calculateOrder() {
      let dataOrder = Number(document.querySelector(`.js-inputData`).value);

      if (dataOrder < 40) {
        dataOrder += 10;
        displayCalculateText(`$${dataOrder}`);
      } else {
        displayCalculateText(`$${dataOrder}`);
      }
    }

    function clickbtn() {
      let offBtn = document.querySelector(`.js-subscribe-btn`);

      if (offBtn.innerHTML === `Subscribe`) {
        offBtn.innerHTML = `Subscribed`;
        offBtn.classList.add(`subscribe-btn-on`);
      } else {
        offBtn.innerHTML = `Subscribe`;
        offBtn.classList.remove(`subscribe-btn-on`);
      }
    }
  </script>
</body>

</html>
