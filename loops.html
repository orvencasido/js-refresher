  <script>
    let i = 1;

    while (i <= 5) {
      console.log(i);
      i++;
    }

    for (let i = 1; i <= 5; i++) {
      console.log(i);
    }

    let randomNum = 0;

    while (randomNum < 0.5) {
      randomNum = Math.random();
      console.log(randomNum);
    }

    let nums = [1, 2, 3];
    let numDoubled = [];

    for (let i = 0; i < nums.length; i++) {
      const num = nums[i];
      numDoubled.push(num * 2);
    }
    console.log(numDoubled);
  </script>
