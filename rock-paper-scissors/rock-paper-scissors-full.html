<!DOCTYPE html>

<html>

<head>
  <title>Rock Paper Scissorcs</title>
  <link rel="stylesheet" href="rock-paper-scissors.css">
</head>

<body>
  <p class="title-game">Rock Paper Scissors</p>
  <button class="game-btn" onclick="playGame(`rock`)"><img class="game-img" src="rock-emoji.png"></button>
  <button class="game-btn" onclick="playGame(`paper`)"><img class="game-img" src="paper-emoji.png"></button>
  <button class="game-btn" onclick="playGame(`scissors`)"><img class="game-img" src="scissors-emoji.png"></button>

  <div class="result-choice">
    <p class="resultDisplay result-game-display"></p>
    <span class="userPickDisplay"><img class="game-img"></span>
    <span class="computerPickDisplay"><img class="game-img"></span>
  </div>

  <div class="score">
    <p class="score-text">Wins: <span class="winsDisplay">0</span></p>
    <p class="score-text">Loss: <span class="lossDisplay">0</span></p>
    <p class="score-text">Ties: <span class="tiesDisplay">0</span></p>
  </div>

  <button class="reset-btn" onclick="resetScore()">Reset Score</button>

  <script src="rock-paper-scissors.js"></script>
</body>

</html>
